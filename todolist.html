<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Interactive Todo List</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            text-align: center;
            margin: 0;
            padding: 40px;
        }

        h1 {
            color: #0a3d62;
        }

        input[type="text"] {
            padding: 10px;
            width: 250px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            margin-left: 5px;
            border: none;
            border-radius: 6px;
            background-color: #0a3d62;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #3c6382;
        }

        ul {
            list-style: none;
            padding: 0;
            margin-top: 20px;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        li {
            background-color: white;
            margin: 8px 0;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        li.completed {
            text-decoration: line-through;
            color: #95a5a6;
        }

        .deleteBtn {
            background-color: #e55039;
            padding: 6px 10px;
            border-radius: 6px;
            color: white;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }

        .deleteBtn:hover {
            background-color: #c23616;
        }

        #counters {
            margin-top: 20px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <h1>Todo List</h1>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button id="addBtn">Add</button>
    <button id="clearBtn">Clear All</button>

    <ul id="taskList"></ul>

    <div id="counters">
        Total tasks: 0 | Completed tasks: 0
    </div>

    <script>
        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const clearBtn = document.getElementById("clearBtn");
        const taskList = document.getElementById("taskList");
        const counters = document.getElementById("counters");

        let totalTasks = 0;
        let completedTasks = 0;

        function updateCounters() {
            counters.textContent = `Total tasks: ${totalTasks} | Completed tasks: ${completedTasks}`;
        }

        function addTask() {
            const taskText = taskInput.value.trim();
            if (taskText === "") return;

            const li = document.createElement("li");
            li.textContent = taskText;

            // Click to mark as complete
            li.addEventListener("click", function(e) {
                // Prevent click on delete button from toggling complete
                if (e.target.classList.contains("deleteBtn")) return;

                li.classList.toggle("completed");
                completedTasks = document.querySelectorAll("li.completed").length;
                updateCounters();
            });

            // Delete button
            const deleteBtn = document.createElement("button");
            deleteBtn.textContent = "Delete";
            deleteBtn.className = "deleteBtn";
            deleteBtn.addEventListener("click", function() {
                li.remove();
                totalTasks--;
                completedTasks = document.querySelectorAll("li.completed").length;
                updateCounters();
            });

            li.appendChild(deleteBtn);
            taskList.appendChild(li);

            totalTasks++;
            updateCounters();
            taskInput.value = "";
        }

        addBtn.addEventListener("click", addTask);

        // Add task on Enter key
        taskInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                addTask();
            }
        });

        clearBtn.addEventListener("click", function() {
            taskList.innerHTML = "";
            totalTasks = 0;
            completedTasks = 0;
            updateCounters();
        });

    </script>

</body>
</html>
